<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="IBS Tagebuch">
  <meta name="theme-color" content="#0d0f18">
  <title>IBS Tagebuch</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f18; -webkit-tap-highlight-color: transparent; }
    input, textarea, button, select { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px; background: #252840; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer; border: none;
    }
    input[type=date], input[type=time] { -webkit-appearance: none; color-scheme: dark; }
    textarea { resize: vertical; }
    select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #252840; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

const BRISTOL = [
  { v:1, desc:"Harte Klumpen" }, { v:2, desc:"Klumpig" },
  { v:3, desc:"Rissig" },        { v:4, desc:"Glatt ✓" },
  { v:5, desc:"Weiche Stücke" }, { v:6, desc:"Matschig" },
  { v:7, desc:"Flüssig" },
];
const SYMPTOME  = ["Blähungen","Brennen","Krämpfe","Übelkeit"];
const TRIGGER   = ["Gluten","Laktose","Koffein","Alkohol","Fettiges","Stress",
                   "Schlafmangel","Rohkost","Zwiebeln","Knoblauch","Hülsenfrüchte",
                   "Scharf","Sorbit","Fruktose"];
const MAHLZEIT_ARTEN = ["Frühstück","Mittagessen","Abendessen","Snack"];
const MAHLZEIT_ICONS = { "Frühstück":"🌅","Mittagessen":"☀️","Abendessen":"🌙","Snack":"🍎" };

const C = {
  bg:"#0d0f18", surface:"#13161f", card:"#181b28", border:"#252840",
  accent:"#818cf8", accentBg:"#818cf820", text:"#e2e8f0",
  muted:"#64748b", success:"#4ade80", warn:"#fb923c", danger:"#f87171",
};

const stressColor  = v => +v<=3 ? C.success : +v<=6 ? C.warn : C.danger;
const bristolColor = v => (v===3||v===4) ? C.success : (v===2||v===5) ? C.warn : C.danger;
const nowStr = () => {
  const d = new Date();
  return { datum: d.toISOString().split("T")[0], uhrzeit: d.toTimeString().slice(0,5) };
};
const newMahlzeit  = () => ({ id: Date.now()+Math.random(), art:"Frühstück", uhrzeit:"", inhalt:"" });
const newStuhlgang = () => ({ id: Date.now()+Math.random(), uhrzeit:"", bristol:null });
const EMPTY = () => ({ ...nowStr(), stresslevel:5, stuhlgaenge:[newStuhlgang()],
  symptome:[], trigger:[], mahlzeiten:[newMahlzeit()], notizen:"" });
const fmtDate = d => { const [y,m,day]=d.split("-"); return `${day}.${m}.${y}`; };

const inp = {
  background:C.card, border:`1px solid ${C.border}`, borderRadius:10,
  color:C.text, padding:"10px 12px", width:"100%", fontSize:14,
  boxSizing:"border-box", colorScheme:"dark",
};
const Label = ({children}) => (
  <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.08em",
    textTransform:"uppercase",marginBottom:8}}>{children}</div>
);
const Sec = ({children,mb=22}) => <div style={{marginBottom:mb}}>{children}</div>;
const Chip = ({active,color,onClick,children}) => (
  <button onClick={onClick} style={{
    background:active?(color?`${color}22`:C.accentBg):C.card,
    border:`1px solid ${active?(color||C.accent):C.border}`,
    color:active?(color||C.accent):C.muted,
    borderRadius:20,padding:"6px 13px",fontSize:13,cursor:"pointer",transition:"all 0.15s",
  }}>{children}</button>
);

function loadEntries() {
  try { const r=localStorage.getItem("ibs-v4"); return r?JSON.parse(r):[]; } catch { return []; }
}
function saveEntries(data) {
  try { localStorage.setItem("ibs-v4",JSON.stringify(data)); } catch {}
}

// ── Bristol-Auswahl Komponente ──
function BristolPicker({ value, onChange }) {
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
        {BRISTOL.map(b=>(
          <button key={b.v} onClick={()=>onChange(b.v)} style={{
            background:value===b.v?`${bristolColor(b.v)}22`:C.surface,
            border:`1px solid ${value===b.v?bristolColor(b.v):C.border}`,
            color:value===b.v?bristolColor(b.v):C.muted,
            borderRadius:8,padding:"7px 4px",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.15s",
          }}>{b.v}</button>
        ))}
      </div>
      {value&&(
        <div style={{marginTop:6,fontSize:11,color:bristolColor(value),fontWeight:500}}>
          Typ {value} — {BRISTOL[value-1].desc}
        </div>
      )}
    </div>
  );
}

// ── Formular ──
function EntryForm({ initial, onSave, onCancel, editMode }) {
  const [form, setForm] = useState(initial);
  const [flash, setFlash] = useState(false);

  const toggle = (f,v) => setForm(p=>({...p,[f]:p[f].includes(v)?p[f].filter(x=>x!==v):[...p[f],v]}));

  // Mahlzeiten
  const addM   = () => setForm(p=>({...p,mahlzeiten:[...p.mahlzeiten,newMahlzeit()]}));
  const delM   = id => setForm(p=>({...p,mahlzeiten:p.mahlzeiten.filter(m=>m.id!==id)}));
  const updM   = (id,f,v) => setForm(p=>({...p,mahlzeiten:p.mahlzeiten.map(m=>m.id===id?{...m,[f]:v}:m)}));

  // Stuhlgänge
  const addS   = () => setForm(p=>({...p,stuhlgaenge:[...p.stuhlgaenge,newStuhlgang()]}));
  const delS   = id => setForm(p=>({...p,stuhlgaenge:p.stuhlgaenge.filter(s=>s.id!==id)}));
  const updS   = (id,f,v) => setForm(p=>({...p,stuhlgaenge:p.stuhlgaenge.map(s=>s.id===id?{...s,[f]:v}:s)}));

  const valid = form.stuhlgaenge.some(s=>s.bristol) || form.symptome.length>0;

  const handleSave = () => {
    if(!valid) return;
    setFlash(true);
    setTimeout(()=>onSave(form), 400);
  };

  return (
    <div>
      {editMode&&(
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button onClick={onCancel} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer",padding:0}}>←</button>
          <div style={{fontWeight:700,fontSize:16}}>Eintrag bearbeiten</div>
        </div>
      )}

      {/* Datum / Uhrzeit */}
      <Sec>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <Label>Datum</Label>
            <input type="date" style={inp} value={form.datum} onChange={e=>setForm(p=>({...p,datum:e.target.value}))} />
          </div>
          <div style={{flex:1}}>
            <Label>Uhrzeit</Label>
            <input type="time" style={inp} value={form.uhrzeit} onChange={e=>setForm(p=>({...p,uhrzeit:e.target.value}))} />
          </div>
        </div>
      </Sec>

      {/* Stress */}
      <Sec>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
          <Label>Stresslevel</Label>
          <span style={{fontSize:22,fontWeight:800,color:stressColor(form.stresslevel)}}>
            {form.stresslevel}<span style={{fontSize:13,color:C.muted}}>/10</span>
          </span>
        </div>
        <input type="range" min={1} max={10} value={form.stresslevel}
          onChange={e=>setForm(p=>({...p,stresslevel:+e.target.value}))} />
        <style>{`input[type=range]::-webkit-slider-thumb{background:${stressColor(form.stresslevel)}}`}</style>
        <div style={{display:"flex",justifyContent:"space-between",color:C.muted,fontSize:11,marginTop:2}}>
          <span>Entspannt</span><span>Sehr gestresst</span>
        </div>
      </Sec>

      {/* Stuhlgänge */}
      <Sec>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <Label>Stuhlgänge <span style={{color:C.accent,fontWeight:700}}>{form.stuhlgaenge.length}×</span></Label>
          <button onClick={addS} style={{
            background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,
            borderRadius:16,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:600,
          }}>+ Hinzufügen</button>
        </div>
        {form.stuhlgaenge.map((s,i)=>(
          <div key={s.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{fontSize:13,color:C.muted,fontWeight:600,flex:1}}>#{i+1}</div>
              <input type="time" value={s.uhrzeit} onChange={e=>updS(s.id,"uhrzeit",e.target.value)}
                style={{...inp,width:"auto",flex:"0 0 108px"}} />
              {form.stuhlgaenge.length>1&&(
                <button onClick={()=>delS(s.id)} style={{background:"none",border:"none",color:C.muted,
                  fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1,flexShrink:0}}>✕</button>
              )}
            </div>
            <Label>Bristol-Typ</Label>
            <BristolPicker value={s.bristol} onChange={v=>updS(s.id,"bristol",v)} />
          </div>
        ))}
      </Sec>

      {/* Symptome */}
      <Sec>
        <Label>Symptome</Label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {SYMPTOME.map(s=><Chip key={s} active={form.symptome.includes(s)} color={C.danger} onClick={()=>toggle("symptome",s)}>{s}</Chip>)}
        </div>
      </Sec>

      {/* Trigger */}
      <Sec>
        <Label>Mögliche Trigger</Label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {TRIGGER.map(t=><Chip key={t} active={form.trigger.includes(t)} color={C.warn} onClick={()=>toggle("trigger",t)}>{t}</Chip>)}
        </div>
      </Sec>

      {/* Mahlzeiten */}
      <Sec>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <Label>Mahlzeiten</Label>
          <button onClick={addM} style={{
            background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,
            borderRadius:16,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:600,
          }}>+ Hinzufügen</button>
        </div>
        {form.mahlzeiten.map(m=>(
          <div key={m.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:10}}>
            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
              <div style={{position:"relative",flex:1}}>
                <select value={m.art} onChange={e=>updM(m.id,"art",e.target.value)}
                  style={{...inp,padding:"9px 12px",paddingRight:28,cursor:"pointer"}}>
                  {MAHLZEIT_ARTEN.map(a=><option key={a} value={a}>{MAHLZEIT_ICONS[a]} {a}</option>)}
                </select>
                <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                  color:C.muted,pointerEvents:"none",fontSize:12}}>▼</span>
              </div>
              <input type="time" value={m.uhrzeit} onChange={e=>updM(m.id,"uhrzeit",e.target.value)}
                style={{...inp,width:"auto",flex:"0 0 108px"}} />
              {form.mahlzeiten.length>1&&(
                <button onClick={()=>delM(m.id)} style={{background:"none",border:"none",color:C.muted,
                  fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1,flexShrink:0}}>✕</button>
              )}
            </div>
            <textarea value={m.inhalt} rows={2} onChange={e=>updM(m.id,"inhalt",e.target.value)}
              placeholder={`Was gab es zum ${m.art}?`} style={{...inp,display:"block"}} />
          </div>
        ))}
      </Sec>

      {/* Notizen */}
      <Sec>
        <Label>Notizen</Label>
        <textarea value={form.notizen} onChange={e=>setForm(p=>({...p,notizen:e.target.value}))}
          placeholder="Weitere Beobachtungen…" rows={2} style={inp} />
      </Sec>

      <button onClick={handleSave} style={{
        width:"100%",padding:14,borderRadius:12,border:"none",
        background:flash?C.success:valid?C.accent:C.border,
        color:valid?"#fff":C.muted,fontSize:15,fontWeight:700,
        cursor:valid?"pointer":"not-allowed",transition:"background 0.3s",
      }}>{flash?"✓ Gespeichert":editMode?"Änderungen speichern":"Eintrag speichern"}</button>
      {!valid&&(
        <div style={{textAlign:"center",color:C.muted,fontSize:12,marginTop:8}}>
          Mindestens ein Stuhlgang mit Bristol-Typ oder ein Symptom erforderlich
        </div>
      )}
    </div>
  );
}

function App() {
  const [view,setView]           = useState("neu");
  const [entries,setEntries]     = useState(loadEntries);
  const [detail,setDetail]       = useState(null);
  const [editEntry,setEditEntry] = useState(null);
  const [importMsg,setImportMsg] = useState(null);
  const fileInputRef             = useRef();

  const persist = data => { setEntries(data); saveEntries(data); };
  const handleNew  = form => { persist([...entries,{...form,id:Date.now()}]); setView("verlauf"); };
  const handleEdit = form => { persist(entries.map(e=>e.id===form.id?form:e)); setEditEntry(null); setDetail(null); setView("verlauf"); };
  const del = id => { persist(entries.filter(e=>e.id!==id)); setDetail(null); };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`ibs-tagebuch-${new Date().toISOString().split("T")[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  };
  const importData = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error();
        persist(data);
        setImportMsg(`✓ ${data.length} Einträge importiert`);
        setTimeout(()=>setImportMsg(null),3000);
      } catch { setImportMsg("✕ Ungültige Datei"); setTimeout(()=>setImportMsg(null),3000); }
    };
    reader.readAsText(file); e.target.value="";
  };

  const ana = useCallback(()=>{
    if(!entries.length) return null;
    const tc=Object.fromEntries(TRIGGER.map(t=>[t,0]));
    const sc=Object.fromEntries(SYMPTOME.map(s=>[s,0]));
    let ts=0, allBristol=[];
    entries.forEach(e=>{
      e.trigger?.forEach(t=>tc[t]!==undefined&&tc[t]++);
      e.symptome?.forEach(s=>sc[s]!==undefined&&sc[s]++);
      ts+=e.stresslevel||0;
      e.stuhlgaenge?.forEach(s=>s.bristol&&allBristol.push(s.bristol));
    });
    const totalStuhl = entries.reduce((a,e)=>a+(e.stuhlgaenge?.length||0),0);
    return {
      n:entries.length,
      avgStress:(ts/entries.length).toFixed(1),
      avgBristol:allBristol.length?(allBristol.reduce((a,b)=>a+b,0)/allBristol.length).toFixed(1):null,
      totalStuhl,
      avgStuhl:(totalStuhl/entries.length).toFixed(1),
      triggers:Object.entries(tc).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]),
      symptoms:Object.entries(sc).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]),
    };
  },[entries])();

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,
      fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',
      maxWidth:480,margin:"0 auto",paddingBottom:80}}>

      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
        padding:"14px 18px",paddingTop:"calc(14px + env(safe-area-inset-top))",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:17,fontWeight:700}}>IBS Tagebuch</div>
          <div style={{color:C.muted,fontSize:12,marginTop:1}}>{entries.length} Eintrag{entries.length!==1?"e":""}</div>
        </div>
        <div style={{fontSize:28}}>🫁</div>
      </div>

      <div style={{padding:16}}>

        {view==="neu" && !editEntry && <EntryForm initial={EMPTY()} onSave={handleNew} editMode={false} />}
        {editEntry && <EntryForm initial={editEntry} onSave={handleEdit} onCancel={()=>setEditEntry(null)} editMode={true} />}

        {/* ── VERLAUF ── */}
        {view==="verlauf" && !editEntry && <>
          {entries.length===0?(
            <div style={{textAlign:"center",color:C.muted,padding:"60px 20px"}}>
              <div style={{fontSize:48}}>📋</div>
              <div style={{marginTop:12}}>Noch keine Einträge</div>
            </div>
          ):[...entries].reverse().map(e=>{
            const stuhlAnz = e.stuhlgaenge?.length || e.haeufigkeit || 0;
            const bristolVals = e.stuhlgaenge?.filter(s=>s.bristol).map(s=>s.bristol) || [];
            return (
              <div key={e.id} onClick={()=>setDetail(detail?.id===e.id?null:e)} style={{
                background:C.card,border:`1px solid ${detail?.id===e.id?C.accent:C.border}`,
                borderRadius:12,padding:"13px 14px",marginBottom:10,cursor:"pointer",transition:"border-color 0.15s",
              }}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{fmtDate(e.datum)} · {e.uhrzeit}</div>
                    <div style={{display:"flex",gap:12,marginTop:4,fontSize:12,flexWrap:"wrap"}}>
                      <span style={{color:stressColor(e.stresslevel)}}>Stress {e.stresslevel}/10</span>
                      <span style={{color:C.muted}}>{stuhlAnz}× Stuhlgang</span>
                      {bristolVals.length>0&&(
                        <span style={{color:C.muted}}>
                          Bristol: {bristolVals.map((v,i)=>(
                            <span key={i} style={{color:bristolColor(v),fontWeight:600}}>{v}{i<bristolVals.length-1?", ":""}</span>
                          ))}
                        </span>
                      )}
                    </div>
                  </div>
                  <div style={{fontSize:12,color:C.muted}}>{detail?.id===e.id?"▲":"▼"}</div>
                </div>

                {e.symptome?.length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                    {e.symptome.map(s=><span key={s} style={{background:`${C.danger}22`,color:C.danger,borderRadius:12,padding:"2px 9px",fontSize:11}}>{s}</span>)}
                  </div>
                )}
                {e.trigger?.length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                    {e.trigger.map(t=><span key={t} style={{background:`${C.warn}22`,color:C.warn,borderRadius:12,padding:"2px 9px",fontSize:11}}>{t}</span>)}
                  </div>
                )}

                {detail?.id===e.id&&(
                  <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                    {/* Stuhlgänge Detail */}
                    {e.stuhlgaenge?.length>0&&(
                      <div style={{marginBottom:10}}>
                        <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Stuhlgänge</div>
                        {e.stuhlgaenge.map((s,i)=>(
                          <div key={s.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",
                            background:C.surface,borderRadius:8,marginBottom:5}}>
                            <span style={{color:C.muted,fontSize:12}}>#{i+1}{s.uhrzeit?` · ${s.uhrzeit}`:""}</span>
                            {s.bristol&&<span style={{background:`${bristolColor(s.bristol)}22`,color:bristolColor(s.bristol),
                              borderRadius:10,padding:"2px 9px",fontSize:11,fontWeight:600}}>Bristol {s.bristol}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                    {/* Mahlzeiten Detail */}
                    {e.mahlzeiten?.filter(m=>m.inhalt).length>0&&(
                      <div style={{marginBottom:10}}>
                        <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Mahlzeiten</div>
                        {e.mahlzeiten.filter(m=>m.inhalt).map(m=>(
                          <div key={m.id} style={{marginBottom:6,padding:"8px 10px",background:C.surface,borderRadius:8}}>
                            <div style={{fontSize:12,color:C.accent,fontWeight:600,marginBottom:2}}>
                              {MAHLZEIT_ICONS[m.art]} {m.art}{m.uhrzeit?` · ${m.uhrzeit}`:""}
                            </div>
                            <div style={{fontSize:13,color:C.muted}}>{m.inhalt}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    {e.notizen&&<div style={{color:C.muted,fontSize:13,marginBottom:12}}>📝 {e.notizen}</div>}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={ev=>{ev.stopPropagation();setEditEntry(e);}} style={{
                        flex:1,background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,
                        borderRadius:8,padding:"8px 0",fontSize:12,fontWeight:600,cursor:"pointer",
                      }}>✏️ Bearbeiten</button>
                      <button onClick={ev=>{ev.stopPropagation();del(e.id);}} style={{
                        flex:1,background:`${C.danger}22`,border:`1px solid ${C.danger}44`,color:C.danger,
                        borderRadius:8,padding:"8px 0",fontSize:12,fontWeight:600,cursor:"pointer",
                      }}>🗑 Löschen</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </>}

        {/* ── ANALYSE ── */}
        {view==="analyse" && !editEntry && <>
          {!ana?(
            <div style={{textAlign:"center",color:C.muted,padding:"60px 20px"}}>
              <div style={{fontSize:48}}>📊</div>
              <div style={{marginTop:12}}>Noch keine Daten für Analyse</div>
            </div>
          ):<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {label:"Einträge",val:ana.n,color:C.accent},
                {label:"Ø Stresslevel",val:ana.avgStress,color:stressColor(ana.avgStress)},
                {label:"Ø Stuhlgänge/Tag",val:ana.avgStuhl,color:C.accent},
                ...(ana.avgBristol?[{label:"Ø Bristol-Typ",val:ana.avgBristol,color:bristolColor(Math.round(ana.avgBristol))}]:[]),
              ].map(item=>(
                <div key={item.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{color:C.muted,fontSize:11,marginBottom:4}}>{item.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:item.color}}>{item.val}</div>
                </div>
              ))}
            </div>
            {ana.symptoms.length>0&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:12}}>
                <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>Symptomhäufigkeit</div>
                {ana.symptoms.map(([s,cnt])=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                    <div style={{color:C.text,fontSize:13,width:100,flexShrink:0}}>{s}</div>
                    <div style={{flex:1,background:C.border,borderRadius:4,height:8,overflow:"hidden"}}>
                      <div style={{background:C.danger,borderRadius:4,height:8,width:`${(cnt/ana.n)*100}%`}} />
                    </div>
                    <div style={{color:C.muted,fontSize:12,minWidth:24,textAlign:"right"}}>{cnt}×</div>
                  </div>
                ))}
              </div>
            )}
            {ana.triggers.length>0&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>Häufigste Trigger</div>
                {ana.triggers.slice(0,8).map(([t,cnt])=>(
                  <div key={t} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                    <div style={{color:C.text,fontSize:13,width:100,flexShrink:0}}>{t}</div>
                    <div style={{flex:1,background:C.border,borderRadius:4,height:8,overflow:"hidden"}}>
                      <div style={{background:C.warn,borderRadius:4,height:8,width:`${(cnt/ana.n)*100}%`}} />
                    </div>
                    <div style={{color:C.muted,fontSize:12,minWidth:24,textAlign:"right"}}>{cnt}×</div>
                  </div>
                ))}
              </div>
            )}
          </>}

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Datensicherung</div>
            <div style={{color:C.muted,fontSize:12,marginBottom:14}}>Daten lokal als JSON exportieren oder eine Sicherung wiederherstellen.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={exportData} disabled={entries.length===0} style={{
                flex:1,padding:"11px 0",borderRadius:10,border:`1px solid ${C.accent}`,
                background:C.accentBg,color:entries.length===0?C.muted:C.accent,
                fontSize:13,fontWeight:600,cursor:entries.length===0?"not-allowed":"pointer",
              }}>⬇ Exportieren</button>
              <button onClick={()=>fileInputRef.current.click()} style={{
                flex:1,padding:"11px 0",borderRadius:10,border:`1px solid ${C.border}`,
                background:C.surface,color:C.text,fontSize:13,fontWeight:600,cursor:"pointer",
              }}>⬆ Importieren</button>
            </div>
            <input ref={fileInputRef} type="file" accept=".json" onChange={importData} style={{display:"none"}} />
            {importMsg&&(
              <div style={{marginTop:10,textAlign:"center",fontSize:13,
                color:importMsg.startsWith("✓")?C.success:C.danger,fontWeight:600}}>{importMsg}</div>
            )}
          </div>
        </>}
      </div>

      {!editEntry&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
          width:"100%",maxWidth:480,background:C.surface,borderTop:`1px solid ${C.border}`,
          display:"flex",paddingBottom:"env(safe-area-inset-bottom)"}}>
          {[{id:"neu",label:"Neu",icon:"✏️"},{id:"verlauf",label:"Verlauf",icon:"📋"},{id:"analyse",label:"Analyse",icon:"📊"}].map(tab=>(
            <button key={tab.id} onClick={()=>setView(tab.id)} style={{
              flex:1,background:"none",border:"none",padding:"10px 8px 12px",
              color:view===tab.id?C.accent:C.muted,cursor:"pointer",
              fontSize:11,fontWeight:view===tab.id?700:400,
              borderTop:`2px solid ${view===tab.id?C.accent:"transparent"}`,
              transition:"color 0.15s",
            }}>
              <div style={{fontSize:20,marginBottom:2}}>{tab.icon}</div>{tab.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
